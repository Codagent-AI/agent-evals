      }

      await installEvalExcludes(worktree)
      const commit = run(exec, 'git', ['-C', worktree, 'rev-parse', 'HEAD'], {}, 'candidate commit lookup')
    category: bug
    difficulty: hard
    priority: high
    source: 2026-07-20 agent-evals
  - id: judge-inherits-secret-environment
    file: evals/agent-runner/and-scene/lib/judge-invoker.mjs
    line_range:
      - 59
      - 59
    description: The Codex judge evaluates an untrusted candidate checkout while inheriting the full
      parent environment. The read-only filesystem sandbox does not prevent shell commands from
      reading environment variables, so prompt-injected repository content can expose GitHub, cloud,
      registry, or other credentials through judge output or authorized network access.
