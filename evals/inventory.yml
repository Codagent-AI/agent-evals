issues:
  - id: candidate-resume-identity-not-verified
    file: evals/agent-runner/and-scene/lib/candidate.mjs
    line_range:
      - 69
      - 69
    description: Resuming a candidate run verifies only that the supplied worktree is a Git worktree; it
      does not verify that the worktree belongs to the requested repository or that HEAD matches the
      checkpointed fixture commit. A resumed evaluation can therefore silently use a different
      repository or revision and produce a score for the wrong candidate identity.
    code_snippet: |2
          `candidate ref lookup ${ref}`,
        )
